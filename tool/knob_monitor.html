<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ESP32S Knob Monitor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Consolas', 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 32px 16px;
  }

  h1 {
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    color: #888;
    margin-bottom: 32px;
    text-transform: uppercase;
  }

  /* ── Knob ── */
  .knob-wrap {
    position: relative;
    width: 260px;
    height: 260px;
    margin-bottom: 36px;
  }

  canvas#knob {
    display: block;
  }

  /* ── Stats ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 32px;
  }

  .stat {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 14px 10px;
    text-align: center;
  }

  .stat .label {
    font-size: 0.65rem;
    color: #555;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat .value {
    font-size: 1.35rem;
    color: #00d4ff;
    font-weight: bold;
  }

  .stat .unit {
    font-size: 0.7rem;
    color: #444;
    margin-top: 2px;
  }

  /* ── Pulse width bar ── */
  .pw-wrap {
    width: 100%;
    max-width: 480px;
    margin-bottom: 32px;
  }

  .pw-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    color: #555;
    margin-bottom: 6px;
  }

  .pw-bar-bg {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    height: 10px;
    overflow: hidden;
  }

  .pw-bar {
    height: 100%;
    background: linear-gradient(90deg, #0088aa, #00d4ff);
    border-radius: 4px;
    transition: width 0.05s linear;
    width: 0%;
  }

  /* ── Log ── */
  .log-box {
    width: 100%;
    max-width: 480px;
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    height: 120px;
    overflow-y: auto;
    padding: 8px 12px;
    font-size: 0.72rem;
    color: #444;
    margin-bottom: 24px;
  }

  .log-box .line { color: #3a7a3a; }
  .log-box .line.warn { color: #aaaa00; }
  .log-box .line.err  { color: #aa3333; }

  /* ── Buttons ── */
  .btns {
    display: flex;
    gap: 12px;
  }

  button {
    padding: 10px 28px;
    border: 1px solid #333;
    border-radius: 6px;
    background: #1a1a1a;
    color: #aaa;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.15s;
  }

  button:hover { background: #252525; color: #fff; border-color: #555; }
  button:disabled { opacity: 0.3; cursor: default; }
  button#btnConnect { border-color: #005577; color: #00d4ff; }
  button#btnConnect.connected { border-color: #aa3333; color: #ff6666; }

  .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #333;
    margin-right: 6px;
    vertical-align: middle;
  }
  .dot.on { background: #00d4ff; box-shadow: 0 0 6px #00d4ff; }
</style>
</head>
<body>

<h1><span class="dot" id="dot"></span>ESP32S · AS5600 Knob Monitor</h1>

<div class="knob-wrap">
  <canvas id="knob" width="260" height="260"></canvas>
</div>

<div class="stats">
  <div class="stat">
    <div class="label">Angle</div>
    <div class="value" id="vDeg">---</div>
    <div class="unit">deg</div>
  </div>
  <div class="stat">
    <div class="label">Radian</div>
    <div class="value" id="vRad">---</div>
    <div class="unit">rad</div>
  </div>
  <div class="stat">
    <div class="label">Raw</div>
    <div class="value" id="vRaw">---</div>
    <div class="unit">/ 4095</div>
  </div>
</div>

<div class="pw-wrap">
  <div class="pw-label">
    <span>PWM Pulse Width</span>
    <span id="vPw">--- us</span>
  </div>
  <div class="pw-bar-bg">
    <div class="pw-bar" id="pwBar"></div>
  </div>
  <div class="pw-label" style="margin-top:4px">
    <span>1000 us (0°)</span>
    <span>2000 us (360°)</span>
  </div>
</div>

<div class="log-box" id="log"></div>

<div class="btns">
  <button id="btnConnect" onclick="toggleConnect()">Connect COM</button>
  <button id="btnClear" onclick="clearLog()">Clear Log</button>
</div>

<script>
// ── Canvas knob ──────────────────────────────────────────────
const canvas = document.getElementById('knob');
const ctx    = canvas.getContext('2d');
const CX = 130, CY = 130, R = 110;

function drawKnob(deg) {
  ctx.clearRect(0, 0, 260, 260);

  // outer ring
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, Math.PI * 2);
  ctx.strokeStyle = '#1e1e1e';
  ctx.lineWidth = 18;
  ctx.stroke();

  // arc progress (start from top = -π/2)
  const startA = -Math.PI / 2;
  const endA   = startA + (deg / 360) * Math.PI * 2;
  ctx.beginPath();
  ctx.arc(CX, CY, R, startA, endA);
  const grad = ctx.createLinearGradient(CX - R, CY, CX + R, CY);
  grad.addColorStop(0, '#004466');
  grad.addColorStop(1, '#00d4ff');
  ctx.strokeStyle = grad;
  ctx.lineWidth = 18;
  ctx.lineCap = 'round';
  ctx.stroke();

  // tick marks
  for (let i = 0; i < 36; i++) {
    const a = (i / 36) * Math.PI * 2 - Math.PI / 2;
    const r1 = R + 14, r2 = R + 20;
    ctx.beginPath();
    ctx.moveTo(CX + Math.cos(a) * r1, CY + Math.sin(a) * r1);
    ctx.lineTo(CX + Math.cos(a) * r2, CY + Math.sin(a) * r2);
    ctx.strokeStyle = '#2a2a2a';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // knob body
  const bodyGrad = ctx.createRadialGradient(CX - 20, CY - 20, 10, CX, CY, 90);
  bodyGrad.addColorStop(0, '#303030');
  bodyGrad.addColorStop(1, '#111');
  ctx.beginPath();
  ctx.arc(CX, CY, R - 16, 0, Math.PI * 2);
  ctx.fillStyle = bodyGrad;
  ctx.fill();

  // pointer line
  const pAngle = startA + (deg / 360) * Math.PI * 2;
  const px = CX + Math.cos(pAngle) * (R - 28);
  const py = CY + Math.sin(pAngle) * (R - 28);
  ctx.beginPath();
  ctx.moveTo(CX, CY);
  ctx.lineTo(px, py);
  ctx.strokeStyle = '#00d4ff';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.stroke();

  // center dot
  ctx.beginPath();
  ctx.arc(CX, CY, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#00d4ff';
  ctx.fill();

  // degree text
  ctx.font = 'bold 28px Consolas, monospace';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(deg.toFixed(1) + '°', CX, CY + 3);
}

drawKnob(0);

// ── Serial ───────────────────────────────────────────────────
let port, reader, connected = false;

async function toggleConnect() {
  if (connected) {
    await disconnect();
  } else {
    await connect();
  }
}

async function connect() {
  try {
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });
    connected = true;
    updateUI(true);
    log('Serial connected @ 115200', 'line');
    readLoop();
  } catch(e) {
    log('Connect failed: ' + e.message, 'err');
  }
}

async function disconnect() {
  connected = false;
  try { reader && await reader.cancel(); } catch(_) {}
  try { port  && await port.close();    } catch(_) {}
  updateUI(false);
  log('Disconnected', 'warn');
}

async function readLoop() {
  const decoder = new TextDecoderStream();
  port.readable.pipeTo(decoder.writable);
  const lineReader = decoder.readable.getReader();
  let buf = '';

  try {
    while (connected) {
      const { value, done } = await lineReader.read();
      if (done) break;
      buf += value;
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) parseLine(line.trim());
    }
  } catch(e) {
    if (connected) log('Read error: ' + e.message, 'err');
  } finally {
    lineReader.releaseLock();
  }
}

// Parse: Raw=3686 | 323.96 deg | 5.6543 rad | PW=1565.43 us
function parseLine(line) {
  if (!line) return;

  const mRaw = line.match(/Raw=\s*(\d+)/);
  const mDeg = line.match(/([\d.]+)\s*deg/);
  const mRad = line.match(/([\d.]+)\s*rad/);
  const mPw  = line.match(/PW=([\d.]+)\s*us/);

  if (mDeg && mRad) {
    const deg = parseFloat(mDeg[1]);
    const rad = parseFloat(mRad[1]);
    const raw = mRaw ? parseInt(mRaw[1]) : null;
    const pw  = mPw  ? parseFloat(mPw[1]) : (1000 + (deg / 360) * 1000);

    drawKnob(deg);
    document.getElementById('vDeg').textContent = deg.toFixed(2);
    document.getElementById('vRad').textContent = rad.toFixed(4);
    if (raw !== null) document.getElementById('vRaw').textContent = raw;
    document.getElementById('vPw').textContent  = pw.toFixed(1) + ' us';
    document.getElementById('pwBar').style.width = ((pw - 1000) / 10) + '%';
  } else {
    // 非數據行（警告/啟動訊息）
    const cls = line.includes('WARN') || line.includes('warn') ? 'warn'
              : line.includes('ERROR') || line.includes('error') ? 'err' : 'line';
    log(line, cls);
  }
}

// ── Log ──────────────────────────────────────────────────────
function log(msg, cls = 'line') {
  const box = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  div.textContent = new Date().toLocaleTimeString() + '  ' + msg;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  if (box.children.length > 200) box.removeChild(box.firstChild);
}

function clearLog() {
  document.getElementById('log').innerHTML = '';
}

function updateUI(on) {
  const btn = document.getElementById('btnConnect');
  const dot = document.getElementById('dot');
  btn.textContent = on ? 'Disconnect' : 'Connect COM';
  btn.className   = on ? 'connected' : '';
  dot.className   = on ? 'dot on' : 'dot';
}

// 初始畫面
log('Open in Chrome/Edge. Click [Connect COM] to select serial port.', 'warn');
</script>
</body>
</html>
